<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="#0a0e1a"/>
  
  <!-- 外环 - 科技感圆环 -->
  <circle cx="200" cy="200" r="140" stroke="url(#gradient2)" stroke-width="3" fill="none" opacity="0.3"/>
  <circle cx="200" cy="200" r="130" stroke="url(#gradient2)" stroke-width="2" fill="none" opacity="0.2"/>
  
  <!-- 六边形 - 代表 AI/科技 -->
  <path d="M200 80 L280 120 L280 200 L200 240 L120 200 L120 120 Z" 
        stroke="url(#gradient1)" stroke-width="3" fill="none" filter="url(#glow)"/>
  
  <!-- 内部 X 形 - 代表 X (无限可能) -->
  <path d="M150 130 L250 230 M250 130 L150 230" 
        stroke="url(#gradient1)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- 爪痕元素 - 代表 Claw -->
  <path d="M200 95 L200 115" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M260 145 L275 155" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M260 205 L275 205" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M260 265 L275 255" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- 电路线条 - 增加科技感 -->
  <path d="M80 200 L110 200" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  <path d="M290 200 L320 200" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  <path d="M200 80 L200 60" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  <path d="M200 320 L200 340" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  
  <!-- 点阵装饰 -->
  <circle cx="80" cy="200" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="320" cy="200" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="200" cy="60" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="200" cy="340" r="3" fill="#00d4ff" opacity="0.8"/>
  
  <!-- 文字 - ClawXAI -->
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="url(#gradient1)" text-anchor="middle" filter="url(#glow)">
    ClawXAI
  </text>
  
  <!-- 副标题 -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="12" 
        fill="#6b7280" text-anchor="middle" letter-spacing="2">
    INTELLIGENT ASSISTANT
  </text>
  
  <!-- 装饰性光点 -->
  <circle cx="140" cy="160" r="2" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="180" r="2" fill="#7b2ff7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="220" r="2" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
