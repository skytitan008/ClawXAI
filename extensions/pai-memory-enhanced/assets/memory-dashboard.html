<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Dashboard - ClawXAI</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px;
      color: white;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 40px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; }
    .stat-value { font-size: 36px; font-weight: bold; margin-bottom: 10px; }
    .stat-label { opacity: 0.8; }
    .memories { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; }
    .memory-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    .memory-type { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; }
    .type-episodic { background: #ff6b6b; }
    .type-semantic { background: #4ecdc4; }
    .type-procedural { background: #45b7d1; }
    .type-emotional { background: #f9ca24; }
    .type-contextual { background: #6c5ce7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Memory Dashboard</h1>
    <div class="stats" id="stats"></div>
    <div class="memories">
      <h2>Recent Memories</h2>
      <div id="memories-list"></div>
    </div>
  </div>
  <script>
    async function loadStats() {
      const res = await fetch('/api/memory/stats');
      const data = await res.json();
      if (data.success) {
        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="stat-value">${data.data.total}</div><div class="stat-label">Total Memories</div></div>
          <div class="stat-card"><div class="stat-value">${data.data.byType.episodic}</div><div class="stat-label">Episodic</div></div>
          <div class="stat-card"><div class="stat-value">${data.data.byType.semantic}</div><div class="stat-label">Semantic</div></div>
          <div class="stat-card"><div class="stat-value">${data.data.byType.procedural}</div><div class="stat-label">Procedural</div></div>
          <div class="stat-card"><div class="stat-value">${(data.data.avgImportance * 100).toFixed(0)}%</div><div class="stat-label">Avg Importance</div></div>
        `;
      }
    }
    async function loadMemories() {
      const res = await fetch('/api/memory/retrieve?query=&limit=10');
      const data = await res.json();
      if (data.success) {
        document.getElementById('memories-list').innerHTML = data.data.map(m => `
          <div class="memory-item">
            <span class="memory-type type-${m.type}">${m.type}</span>
            <div>${m.content}</div>
            <small>Importance: ${(m.importance * 100).toFixed(0)}% | Accessed: ${m.accessCount} times</small>
          </div>
        `).join('');
      }
    }
    loadStats();
    loadMemories();
  </script>
</body>
</html>
