<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Avatar - ClawXAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      padding: 20px;
    }

    .avatar-canvas {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    #live2d-canvas {
      width: 100%;
      height: 500px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
    }

    .controls {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn.active {
      background: rgba(255, 255, 255, 0.4);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }

    .emotion-display {
      margin-top: 10px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦎 ClawXAI Live2D Avatar</h1>
    
    <div class="avatar-canvas">
      <canvas id="live2d-canvas"></canvas>
    </div>

    <div class="controls">
      <button class="btn" data-emotion="neutral">😐 Neutral</button>
      <button class="btn" data-emotion="joy">😊 Joy</button>
      <button class="btn" data-emotion="sadness">😢 Sad</button>
      <button class="btn" data-emotion="anger">😠 Angry</button>
      <button class="btn" data-emotion="surprise">😮 Surprise</button>
      <button class="btn" data-emotion="fear">😨 Fear</button>
      <button class="btn" data-emotion="disgust">🤢 Disgust</button>
    </div>

    <div class="status">
      <div>Status: <span id="status-text">Initializing...</span></div>
      <div class="emotion-display" id="emotion-display">Current: Neutral</div>
    </div>
  </div>

  <script type="module">
    const canvas = document.getElementById('live2d-canvas');
    const statusText = document.getElementById('status-text');
    const emotionDisplay = document.getElementById('emotion-display');
    const buttons = document.querySelectorAll('.btn');

    let currentEmotion = 'neutral';

    // Initialize
    async function init() {
      try {
        statusText.textContent = 'Loading Live2D renderer...';
        
        // Check if renderer is available
        const response = await fetch('/api/live2d/model');
        const data = await response.json();
        
        if (data.success) {
          statusText.textContent = 'Live2D Ready';
          console.log('Live2D State:', data.data);
        } else {
          statusText.textContent = 'Live2D not initialized (model not loaded)';
        }
      } catch (error) {
        statusText.textContent = 'Error: ' + error.message;
        console.error('Live2D init error:', error);
      }
    }

    // Set emotion
    async function setEmotion(emotion) {
      try {
        const response = await fetch('/api/live2d/emotion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ emotion }),
        });

        const data = await response.json();
        
        if (data.success) {
          currentEmotion = emotion;
          emotionDisplay.textContent = `Current: ${emotion.charAt(0).toUpperCase() + emotion.slice(1)}`;
          
          // Update button states
          buttons.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.emotion === emotion);
          });
        }
      } catch (error) {
        console.error('Set emotion error:', error);
      }
    }

    // Event listeners
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const emotion = btn.dataset.emotion;
        setEmotion(emotion);
      });
    });

    // Listen for emotion events from server
    if (window.EventSource) {
      const eventSource = new EventSource('/api/events');
      eventSource.addEventListener('emotion:detected', (event) => {
        const data = JSON.parse(event.data);
        setEmotion(data.emotion);
      });
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
