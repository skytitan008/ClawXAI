<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Control - ClawXAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      max-width: 800px;
      width: 100%;
      padding: 20px;
    }

    .voice-panel {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .voice-controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 20px 0;
    }

    .btn {
      padding: 15px 30px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
    }

    .btn-primary.recording {
      background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
      animation: pulse 1.5s infinite;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 2s infinite;
    }

    .status-dot.offline {
      background: #ef4444;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .transcript-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 20px;
      min-height: 150px;
      margin: 20px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .settings-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    select, input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
    }

    select option {
      background: #764ba2;
      color: white;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
      opacity: 0.9;
    }

    .provider-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      font-size: 12px;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="voice-panel">
      <h1>🎤 Voice Control</h1>
      <p style="text-align: center; opacity: 0.8; margin-top: 10px;">
        Speech-to-Text & Text-to-Speech Integration
      </p>

      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>

      <div class="voice-controls">
        <button class="btn btn-primary" id="recordBtn" onclick="toggleRecording()">
          <span>🎙️</span>
          <span id="recordText">Start Recording</span>
        </button>
        <button class="btn btn-secondary" onclick="testTTS()">
          <span>🔊</span>
          <span>Test TTS</span>
        </button>
      </div>

      <div class="transcript-box">
        <strong>Transcript:</strong>
        <p id="transcriptText" style="margin-top: 10px; opacity: 0.9;">
          Press "Start Recording" and speak...
        </p>
      </div>
    </div>

    <div class="voice-panel settings-panel">
      <h2>⚙️ Settings</h2>
      
      <div class="setting-row">
        <label>STT Provider</label>
        <select id="sttProvider" onchange="updateConfig()">
          <option value="mock">Mock (Test)</option>
          <option value="whisper">Whisper</option>
          <option value="deepgram">Deepgram</option>
          <option value="google">Google</option>
          <option value="azure">Azure</option>
        </select>
      </div>

      <div class="setting-row">
        <label>TTS Provider</label>
        <select id="ttsProvider" onchange="updateConfig()">
          <option value="mock">Mock (Test)</option>
          <option value="elevenlabs">ElevenLabs</option>
          <option value="google">Google</option>
          <option value="azure">Azure</option>
        </select>
      </div>

      <div class="setting-row">
        <label>Language</label>
        <select id="language" onchange="updateConfig()">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
        </select>
      </div>

      <div class="setting-row">
        <label>Auto Transcribe</label>
        <input type="checkbox" id="autoTranscribe" checked onchange="updateConfig()">
      </div>

      <div class="setting-row">
        <label>Auto Speak</label>
        <input type="checkbox" id="autoSpeak" onchange="updateConfig()">
      </div>
    </div>
  </div>

  <script>
    let isRecording = false;
    const API_BASE = window.location.origin;

    async function toggleRecording() {
      const btn = document.getElementById('recordBtn');
      const text = document.getElementById('recordText');
      const statusText = document.getElementById('statusText');

      if (!isRecording) {
        // Start recording
        try {
          const response = await fetch(`${API_BASE}/api/voice/stt/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          
          if (response.ok) {
            isRecording = true;
            btn.classList.add('recording');
            text.textContent = 'Stop Recording';
            statusText.textContent = 'Recording...';
            document.getElementById('transcriptText').textContent = 'Listening...';
          }
        } catch (error) {
          console.error('Failed to start recording:', error);
          statusText.textContent = 'Error starting recording';
          document.getElementById('statusDot').classList.add('offline');
        }
      } else {
        // Stop recording
        try {
          const response = await fetch(`${API_BASE}/api/voice/stt/stop`, {
            method: 'POST'
          });
          
          const data = await response.json();
          
          if (response.ok) {
            isRecording = false;
            btn.classList.remove('recording');
            text.textContent = 'Start Recording';
            statusText.textContent = 'Processing...';
            
            if (data.transcript) {
              document.getElementById('transcriptText').textContent = data.transcript;
            }
            
            setTimeout(() => {
              statusText.textContent = 'Ready';
            }, 1000);
          }
        } catch (error) {
          console.error('Failed to stop recording:', error);
          statusText.textContent = 'Error stopping recording';
        }
      }
    }

    async function testTTS() {
      const statusText = document.getElementById('statusText');
      statusText.textContent = 'Generating speech...';
      
      try {
        const response = await fetch(`${API_BASE}/api/voice/tts/speak`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: 'Hello! This is a test of the voice system.',
            voice: 'default'
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.audioUrl) {
          const audio = new Audio(data.audioUrl);
          audio.play();
          statusText.textContent = 'Playing audio...';
          
          audio.onended = () => {
            statusText.textContent = 'Ready';
          };
        } else {
          statusText.textContent = 'TTS test completed (mock mode)';
          setTimeout(() => {
            statusText.textContent = 'Ready';
          }, 2000);
        }
      } catch (error) {
        console.error('TTS test failed:', error);
        statusText.textContent = 'TTS test completed (mock mode)';
        setTimeout(() => {
          statusText.textContent = 'Ready';
        }, 2000);
      }
    }

    async function updateConfig() {
      const config = {
        stt: {
          provider: document.getElementById('sttProvider').value,
          language: document.getElementById('language').value
        },
        tts: {
          provider: document.getElementById('ttsProvider').value,
          language: document.getElementById('language').value
        },
        autoTranscribe: document.getElementById('autoTranscribe').checked,
        autoSpeak: document.getElementById('autoSpeak').checked
      };

      try {
        await fetch(`${API_BASE}/api/voice/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        console.log('Config updated:', config);
      } catch (error) {
        console.error('Failed to update config:', error);
      }
    }

    // Check initial status
    async function checkStatus() {
      try {
        const response = await fetch(`${API_BASE}/api/voice/status`);
        const data = await response.json();
        
        if (response.ok && data.enabled) {
          document.getElementById('statusDot').classList.remove('offline');
          document.getElementById('statusText').textContent = 'Ready';
          
          // Load saved config
          if (data.config) {
            document.getElementById('sttProvider').value = data.config.stt?.provider || 'mock';
            document.getElementById('ttsProvider').value = data.config.tts?.provider || 'mock';
            document.getElementById('language').value = data.config.stt?.language || 'zh-CN';
            document.getElementById('autoTranscribe').checked = data.config.autoTranscribe ?? true;
            document.getElementById('autoSpeak').checked = data.config.autoSpeak ?? false;
          }
        } else {
          document.getElementById('statusDot').classList.add('offline');
          document.getElementById('statusText').textContent = 'Voice system disabled';
        }
      } catch (error) {
        console.error('Failed to check status:', error);
        document.getElementById('statusDot').classList.add('offline');
        document.getElementById('statusText').textContent = 'Connection error';
      }
    }

    checkStatus();
  </script>
</body>
</html>
